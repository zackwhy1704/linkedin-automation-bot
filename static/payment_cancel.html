<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
        p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 15px; }
        .btn {
            display: inline-block; color: white;
            padding: 14px 32px; border-radius: 12px; text-decoration: none;
            font-size: 18px; font-weight: bold; margin-top: 15px;
            transition: transform 0.2s;
        }
        .btn-primary { background: #667eea; }
        .btn:hover { transform: scale(1.05); }
        .countdown { color: #f5576c; font-weight: bold; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128075;</div>

        <h1>Payment Cancelled</h1>
        <p>No charges were made to your account.</p>
        <p>No worries! You can subscribe anytime when you're ready.</p>

        <a id="telegram-link" class="btn btn-primary" href="#">Return to Telegram Bot</a>
        <p class="countdown" id="countdown">Closing in 3...</p>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var botUsername = params.get('bot') || '';
        var telegramUrl = botUsername
            ? 'https://t.me/' + botUsername + '?start=payment_cancel'
            : '';

        var linkEl = document.getElementById('telegram-link');
        if (telegramUrl) {
            linkEl.href = telegramUrl;
        } else {
            linkEl.style.display = 'none';
        }

        var isTelegramWebApp = !!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData);
        var seconds = 3;
        var countdownEl = document.getElementById('countdown');

        if (isTelegramWebApp) {
            countdownEl.textContent = 'Closing in 3...';
        } else {
            countdownEl.textContent = telegramUrl ? 'Redirecting in 3...' : 'You can close this page.';
        }

        var timer = setInterval(function() {
            seconds--;
            if (seconds > 0) {
                countdownEl.textContent = (isTelegramWebApp ? 'Closing' : 'Redirecting') + ' in ' + seconds + '...';
            } else {
                clearInterval(timer);
                if (isTelegramWebApp) {
                    countdownEl.textContent = 'Returning to bot...';
                    try { window.Telegram.WebApp.close(); } catch(e) {}
                } else if (telegramUrl) {
                    countdownEl.textContent = 'Redirecting now...';
                    window.location.href = telegramUrl;
                } else {
                    countdownEl.textContent = 'You can close this page.';
                }
            }
        }, 1000);

        linkEl.addEventListener('click', function(e) {
            if (isTelegramWebApp) {
                e.preventDefault();
                try { window.Telegram.WebApp.close(); } catch(err) {}
            }
        });
    </script>
</body>
</html>
