<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .checkmark {
            width: 80px; height: 80px; border-radius: 50%;
            display: block; stroke-width: 3; stroke: #4CAF50;
            stroke-miterlimit: 10; margin: 0 auto 20px;
            box-shadow: inset 0px 0px 0px #4CAF50;
            animation: fill 0.4s ease-in-out 0.4s forwards, scale 0.3s ease-in-out 0.9s both;
        }
        .checkmark__circle {
            stroke-dasharray: 166; stroke-dashoffset: 166;
            stroke-width: 3; stroke-miterlimit: 10; stroke: #4CAF50; fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }
        .checkmark__check {
            transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 30px #4CAF50; } }
        h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
        p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 20px; }
        .info { background: #f5f5f5; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .info p { margin: 5px 0; font-size: 14px; color: #555; }
        .btn {
            display: inline-block; background: #667eea; color: white;
            padding: 14px 32px; border-radius: 12px; text-decoration: none;
            font-size: 18px; font-weight: bold; margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .countdown { color: #667eea; font-weight: bold; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
            <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>

        <h1>Payment Successful!</h1>
        <p>Your subscription has been activated.</p>

        <div class="info">
            <p><strong>&#10003;</strong> Subscription Active</p>
            <p><strong>&#10003;</strong> Full Access Granted</p>
            <p><strong>&#10003;</strong> Ready to Use</p>
        </div>

        <a id="telegram-link" class="btn" href="#">Open Telegram Bot</a>
        <p class="countdown" id="countdown">Closing in 3...</p>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var botUsername = params.get('bot') || '';
        var telegramUrl = botUsername
            ? 'https://t.me/' + botUsername + '?start=payment_success'
            : '';

        // Set the button link
        var linkEl = document.getElementById('telegram-link');
        if (telegramUrl) {
            linkEl.href = telegramUrl;
        } else {
            linkEl.style.display = 'none';
        }

        // Detect if running inside Telegram WebApp
        var isTelegramWebApp = !!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData);

        // Auto-close / redirect countdown
        var seconds = 3;
        var countdownEl = document.getElementById('countdown');

        if (isTelegramWebApp) {
            countdownEl.textContent = 'Closing in 3...';
        } else {
            countdownEl.textContent = telegramUrl ? 'Redirecting in 3...' : 'Payment complete!';
        }

        var timer = setInterval(function() {
            seconds--;
            if (seconds > 0) {
                countdownEl.textContent = (isTelegramWebApp ? 'Closing' : 'Redirecting') + ' in ' + seconds + '...';
            } else {
                clearInterval(timer);
                if (isTelegramWebApp) {
                    // Close the Telegram WebApp webview
                    countdownEl.textContent = 'Returning to bot...';
                    try { window.Telegram.WebApp.close(); } catch(e) {}
                } else if (telegramUrl) {
                    // Regular browser — redirect to Telegram deep link
                    countdownEl.textContent = 'Redirecting now...';
                    window.location.href = telegramUrl;
                } else {
                    countdownEl.textContent = 'You can close this page.';
                }
            }
        }, 1000);

        // Also handle the button click in Telegram WebApp
        linkEl.addEventListener('click', function(e) {
            if (isTelegramWebApp) {
                e.preventDefault();
                try { window.Telegram.WebApp.close(); } catch(err) {}
            }
        });
    </script>
</body>
</html>
