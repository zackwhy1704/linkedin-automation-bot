services:
  # ─── PostgreSQL Database ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env.production
    environment:
      POSTGRES_DB: linkedin_bot
      POSTGRES_USER: linkedin_bot
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkedin_bot -d linkedin_bot"]
      interval: 10s
      retries: 5

  # ─── Redis (Celery broker + result backend) ─────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ─── Telegram Bot (main process) ────────────────────────────────────
  bot:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.production
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: linkedin_bot
      DATABASE_USER: linkedin_bot
      REDIS_URL: redis://redis:6379/0
      HEADLESS: "True"
    volumes:
      - screenshots:/app/screenshots
      - cookies:/app/cookies
      - logs:/app/logs
    command: python multiuser/telegram_bot_multiuser.py

  # ─── Payment Server (Flask — Stripe webhooks + redirect pages) ──────
  payment:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.production
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: linkedin_bot
      DATABASE_USER: linkedin_bot
    expose:
      - "5000"
    command: >
      gunicorn payment_server:app
      --bind 0.0.0.0:5000
      --workers 2
      --timeout 30
      --access-logfile -

  # ─── Celery Workers (browser automation tasks) ──────────────────────
  # Scale with: docker compose up -d --scale worker=5
  worker:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.production
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: linkedin_bot
      DATABASE_USER: linkedin_bot
      REDIS_URL: redis://redis:6379/0
      HEADLESS: "True"
    volumes:
      - screenshots:/app/screenshots
      - cookies:/app/cookies
      - logs:/app/logs
    # Each worker runs 1 concurrent task (Chrome is heavy)
    # Scale horizontally instead: docker compose up --scale worker=5
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=1
      --max-tasks-per-child=50
      -Q posting,engagement,connections,job_search,notifications
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # ─── Caddy (auto-HTTPS reverse proxy) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - payment

volumes:
  pgdata:
  screenshots:
  cookies:
  logs:
  caddy_data:
  caddy_config:
