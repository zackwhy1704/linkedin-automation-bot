<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyx Property System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2942 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #e63946 0%, #d62828 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.4);
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 25px;
            border: 3px solid white;
            border-bottom: none;
            border-radius: 15px 15px 0 0;
            top: 15px;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            bottom: 12px;
            border-radius: 2px;
        }

        .logo-text {
            font-size: 42px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
        }

        .login-box {
            background: rgba(20, 35, 60, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(15, 25, 45, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus {
            outline: none;
            border-color: #e63946;
            background: rgba(15, 25, 45, 0.8);
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #e63946 0%, #d62828 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(230, 57, 70, 0.6);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: center;
            margin-top: 25px;
        }

        .forgot-password a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }

        .forgot-password a:hover {
            color: #e63946;
            border-bottom-color: #e63946;
        }

        /* Icon styles */
        .user-icon::before {
            content: '👤';
        }

        .lock-icon::before {
            content: '🔒';
        }

        /* Decorative elements */
        .bg-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.05;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: #e63946;
            top: -100px;
            right: -100px;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: #4361ee;
            bottom: -50px;
            left: -50px;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            background: #7209b7;
            top: 50%;
            right: 10%;
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
                <div class="logo-icon"></div>
                <div class="logo-text">Catalyx</div>
            </div>
            <div class="logo-subtitle">PROPERTY SYSTEM</div>
        </div>

        <div class="login-box">
            <form>
                <div class="input-group">
                    <span class="input-icon user-icon"></span>
                    <input type="text" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <span class="input-icon lock-icon"></span>
                    <input type="password" placeholder="Password" required>
                </div>

                <button type="submit" class="login-btn">Login</button>

                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
